name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-test:
    name: SDK Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Smoke test AgentLens SDK
        run: |
          node -e "
          const { AgentLens } = require('./src/sdk/index.js');
          const lens = new AgentLens({ project: 'ci-test' });

          // Log a few entries across different agents
          lens.log({ agent: 'executor',      task_id: 't1', success: true,  tokens: 5000, duration_ms: 1200 });
          lens.log({ agent: 'executor',      task_id: 't2', success: true,  tokens: 3000, duration_ms: 800 });
          lens.log({ agent: 'code-reviewer', task_id: 't3', success: true,  tokens: 2000, duration_ms: 400 });
          lens.log({ agent: 'debugger',      task_id: 't4', success: false, tokens: 1500, duration_ms: 600, retries: 1 });
          lens.log({ agent: 'planner',       task_id: 't5', success: true,  tokens: 8000, duration_ms: 2000, irkx: 'R' });

          // Generate dashboard (prints to stdout + returns object)
          const result = lens.dashboard({ period: 'today' });
          console.log('');

          // Assertions
          const ok = (cond, msg) => { if (!cond) { console.error('FAIL:', msg); process.exit(1); } };

          ok(result.total === 5, 'Expected 5 total invocations, got ' + result.total);
          ok(Object.keys(result.agents).length === 3, 'Expected 3 agents, got ' + Object.keys(result.agents).length);
          ok(result.agents['executor'].total === 2, 'Executor should have 2 invocations');
          ok(result.agents['executor'].success === 2, 'Executor should have 2 successes');
          ok(result.agents['executor'].tokens === 8000, 'Executor tokens should be 8000');
          ok(result.agents['code-reviewer'].total === 1, 'Code-reviewer should have 1 invocation');
          ok(result.agents['debugger'].total === 1, 'Debugger should have 1 invocation');
          ok(result.agents['debugger'].success === 0, 'Debugger should have 0 successes');

          console.log('');
          console.log('All SDK smoke tests passed.');
          "

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    needs: sdk-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build dashboard
        run: |
          cd dashboard
          npm ci
          npx prisma generate
          npm run build
