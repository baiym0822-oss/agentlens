name: Pages

on:
  push:
    branches: [main]
    paths:
      - landing/index.html

jobs:
  sync-landing:
    name: Sync Landing to Pages Root
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Copy landing/index.html to root
        run: cp landing/index.html index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes — root index.html is already in sync."
            exit 0
          fi

          git add index.html
          git commit -m "chore: sync landing/index.html to root for GitHub Pages"
          git push
